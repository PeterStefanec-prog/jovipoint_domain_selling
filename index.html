<!doctype html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jovipoint.sk</title>
  <meta name="description" content="jovipoint.sk — doména na predaj." />

  <style>
    :root {
      --bg: #f5f5f7;
      --text: #0f1115;
      --muted: #6e7381;
      --line: rgba(15, 17, 21, 0.08);
      --glass: rgba(255, 255, 255, 0.72);
      --shadow: 0 20px 60px rgba(17, 24, 39, 0.10);
      --shadow-soft: 0 10px 30px rgba(17, 24, 39, 0.06);
      --mx: 50%;
      --my: 50%;
      --container: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Inter, sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(122, 162, 255, 0.20), transparent 24%),
        radial-gradient(circle at 85% 12%, rgba(166, 109, 255, 0.14), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255, 177, 95, 0.12), transparent 30%),
        linear-gradient(180deg, #fbfbfd 0%, #f2f3f7 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(500px circle at var(--mx) var(--my), rgba(255,255,255,0.75), transparent 50%);
      opacity: 0.9;
    }

    .aurora,
    .noise,
    .halo {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .aurora::before,
    .aurora::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(80px);
      opacity: 0.65;
      animation: float 16s ease-in-out infinite;
    }

    .aurora::before {
      width: 420px;
      height: 420px;
      top: -100px;
      left: -80px;
      background: rgba(113, 157, 255, 0.22);
    }

    .aurora::after {
      width: 360px;
      height: 360px;
      right: -80px;
      top: 100px;
      background: rgba(185, 120, 255, 0.18);
      animation-delay: -7s;
    }

    .halo::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 46%;
      transform: translate(-50%, -50%);
      width: min(78vw, 1000px);
      height: min(78vw, 1000px);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.42) 32%, transparent 68%);
      opacity: 0.75;
      animation: breathe 10s ease-in-out infinite;
    }

    .noise {
      opacity: 0.04;
      background-image:
        radial-gradient(circle at 20% 20%, #000 0.5px, transparent 0.8px),
        radial-gradient(circle at 70% 55%, #000 0.5px, transparent 0.8px),
        radial-gradient(circle at 40% 82%, #000 0.5px, transparent 0.8px);
      background-size: 28px 28px, 34px 34px, 22px 22px;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(calc(100% - 32px), var(--container));
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px 0 80px;
    }

    .hero-inner {
      max-width: 920px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 11vw, 8.2rem);
      line-height: 1.02;
      letter-spacing: -0.055em;
      font-weight: 800;
      padding: 0.04em 0 0.10em;
      text-wrap: balance;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .title-gradient {
      display: inline-block;
      background: linear-gradient(180deg, #111827 0%, #2a3346 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin: 22px 0 0;
      font-size: clamp(1.1rem, 2.2vw, 1.45rem);
      line-height: 1.45;
      color: #2b3240;
      letter-spacing: -0.03em;
      max-width: 22ch;
    }

    .cta {
      margin-top: 34px;
    }

    .btn {
      position: relative;
      min-height: 58px;
      padding: 0 24px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.01em;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      overflow: hidden;
      color: white;
      background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
      box-shadow: 0 14px 30px rgba(17, 24, 39, 0.16);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.22) 50%, transparent 80%);
      transform: translateX(-130%);
    }

    .btn:hover::before {
      animation: sweep 1s ease;
    }

    .footer {
      padding: 0 0 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes float {
      0%, 100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(16px,18px,0) scale(1.05); }
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.78; }
      50% { transform: translate(-50%, -50%) scale(1.04); opacity: 0.55; }
    }

    @keyframes sweep {
      to { transform: translateX(130%); }
    }

    @media (max-width: 720px) {
      h1 {
        font-size: clamp(3.3rem, 18vw, 5.6rem);
      }

      .subtitle {
        max-width: 18ch;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }

      .reveal {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="halo"></div>
  <div class="noise"></div>

  <div class="wrap">
    <main class="hero">
      <div class="hero-inner reveal">
        <h1><span class="title-gradient">jovipoint.sk</span></h1>

        <p class="subtitle">Doména na predaj.</p>

        <div class="cta">
          <a class="btn" href="mailto:stefanecpeter9@gmail.com?subject=Záujem o doménu jovipoint.sk">
            Kontakt
          </a>
        </div>
      </div>
    </main>

    <div class="footer">jovipoint.sk</div>
  </div>

  <script>
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (!prefersReducedMotion) {
      const reveal = document.querySelector(".reveal");
      requestAnimationFrame(() => reveal.classList.add("visible"));

      window.addEventListener("mousemove", (e) => {
        document.documentElement.style.setProperty("--mx", e.clientX + "px");
        document.documentElement.style.setProperty("--my", e.clientY + "px");
      });
    } else {
      document.querySelector(".reveal").classList.add("visible");
    }
  </script>

  <script data-goatcounter="https://peter1001.goatcounter.com/count"
          async src="//gc.zgo.at/count.js">
  </script>
</body>
</html>

<!doctype html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jovipoint.sk</title>
  <meta name="description" content="jovipoint.sk — doména na predaj." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet" />

  <style>
    :root { --text: #0f1115; --muted: #8b90a0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: #f0f1f5;
    }

    canvas#bg { position: fixed; inset: 0; z-index: 0; }

    .wash {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse 52% 42% at 50% 50%,
        rgba(240,241,245,0.88) 0%, rgba(240,241,245,0.40) 45%, rgba(240,241,245,0.0) 74%);
    }

    .wrap {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
    }

    .hero {
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
    }

    h1 {
      font-size: clamp(3.6rem, 10vw, 7.8rem);
      font-weight: 800; letter-spacing: -0.055em; line-height: 1;
      background: linear-gradient(168deg, #0d1117 5%, #2a3550 50%, #4a5a80 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      -webkit-font-smoothing: antialiased; user-select: none;
      opacity: 0; transform: translateY(28px) scale(0.96);
      animation: heroIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    .subtitle {
      margin-top: 16px;
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 300; color: #3b4459; letter-spacing: -0.015em;
      opacity: 0; transform: translateY(18px);
      animation: heroIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.72s forwards;
    }

    .cta {
      margin-top: 34px; pointer-events: auto;
      opacity: 0; transform: translateY(18px);
      animation: heroIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.95s forwards;
    }

    .btn {
      position: relative; display: inline-flex; align-items: center; gap: 8px;
      padding: 15px 30px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer; text-decoration: none;
      font-family: 'Outfit', sans-serif; font-weight: 600;
      font-size: 0.95rem; letter-spacing: -0.01em; color: white;
      background: linear-gradient(145deg, #111827 0%, #1a2236 50%, #252f45 100%);
      box-shadow: 0 1px 0 0 rgba(255,255,255,0.06) inset,
        0 18px 44px rgba(17,24,39,0.20), 0 6px 14px rgba(17,24,39,0.10);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s ease;
      overflow: hidden;
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 1px 0 0 rgba(255,255,255,0.08) inset,
        0 24px 56px rgba(17,24,39,0.25), 0 10px 24px rgba(17,24,39,0.13);
    }
    .btn::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.13) 50%, transparent 75%);
      transform: translateX(-130%);
    }
    .btn:hover::after { animation: shimmer 0.9s ease forwards; }
    .btn svg { width: 15px; height: 15px; transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); }
    .btn:hover svg { transform: translateX(3px); }

    .footer {
      position: fixed; bottom: 22px; left: 0; right: 0;
      text-align: center; z-index: 2;
      font-size: 0.78rem; font-weight: 300; color: var(--muted);
      opacity: 0; animation: fadeIn 1.2s ease 1.6s forwards;
      pointer-events: none; letter-spacing: 0.02em;
    }

    @keyframes heroIn { to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes fadeIn  { to { opacity: 1; } }
    @keyframes shimmer { to { transform: translateX(130%); } }

    @media (max-width: 720px) {
      h1 { font-size: clamp(2.8rem, 15vw, 5rem); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      h1, .subtitle, .cta, .footer { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="wash"></div>

  <div class="wrap">
    <main class="hero">
      <h1>jovipoint.sk</h1>
      <p class="subtitle">Doména na predaj.</p>
      <div class="cta">
        <a class="btn" href="mailto:stefanecpeter9@gmail.com?subject=Záujem o doménu jovipoint.sk">
          Kontakt
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        </a>
      </div>
    </main>
  </div>

  <div class="footer">jovipoint.sk</div>

<script>
(() => {
  if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

  const isMobile = innerWidth < 768;
  const COUNT = isMobile ? 120 : 300;

  const P = {
    friction:       0.98,
    returnK:        0.008,           // stronger spring = tighter clusters
    mousePush:      1.4,             // whisper-gentle
    mouseRadius:    isMobile ? 90 : 130,

    // Two-tier connections
    linkNear:       isMobile ? 90 : 120,    // inner: strong visible mesh
    linkFar:        isMobile ? 140 : 190,    // outer: faint ambient web
    linkNearAlpha:  0.18,
    linkFarAlpha:   0.045,
    triAlpha:       0.012,                   // triangle fill opacity

    mLinkDist:      140,
    mLinkBase:      0.07,

    depthLayers:    3,
    driftSpeeds:    [0.035, 0.065, 0.10],
    driftRadius:    [12, 16, 20],            // much tighter orbits

    palette: [
      { h: 218, s: 58, l: 72 },
      { h: 248, s: 40, l: 74 },
      { h: 198, s: 46, l: 70 },
      { h: 275, s: 34, l: 75 },
      { h: 28,  s: 48, l: 76 },
    ],
  };

  const cvs = document.getElementById("bg");
  const ctx = cvs.getContext("2d");
  let W, H, dpr;

  function resize() {
    dpr = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    cvs.width  = W * dpr;
    cvs.height = H * dpr;
    cvs.style.width  = W + "px";
    cvs.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  let mx = -9999, my = -9999, pmx = -9999, pmy = -9999;
  let mvx = 0, mvy = 0;
  let smx = -9999, smy = -9999;

  class Node {
    constructor() {
      this.depth = Math.floor(Math.random() * P.depthLayers);
      const dt = this.depth / (P.depthLayers - 1);

      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.px = this.x;
      this.py = this.y;
      this.hx = this.x;
      this.hy = this.y;

      this.da    = Math.random() * Math.PI * 2;
      this.db    = Math.random() * Math.PI * 2;
      const dr   = P.driftRadius[this.depth];
      this.dRx   = dr + Math.random() * dr * 0.6;
      this.dRy   = dr + Math.random() * dr * 0.6;
      this.dFreq = P.driftSpeeds[this.depth] * (0.7 + Math.random() * 0.6);
      this.dRat  = 0.5 + Math.random() * 1.0;

      // Unique curve seed for bezier connections
      this.curveSeed = (Math.random() - 0.5) * 0.4;

      const sz = 0.35 + dt * 0.65;
      this.r = (1.0 + Math.random() * 2.0) * sz;

      const c = P.palette[Math.floor(Math.random() * P.palette.length)];
      this.hue = c.h + (Math.random() - 0.5) * 16;
      this.sat = c.s + (Math.random() - 0.5) * 8;
      this.lit = c.l;
      this.alpha = 0.18 + dt * 0.30;

      this.mw  = 0.2 + dt * 0.8;
      this.vel = 0;

      // Neighbor cache for triangle detection
      this.neighbors = [];
    }

    update(t) {
      let vx = (this.x - this.px) * P.friction;
      let vy = (this.y - this.py) * P.friction;

      this.da += this.dFreq * 0.005;
      const tx = this.hx + Math.cos(this.da) * this.dRx;
      const ty = this.hy + Math.sin(this.da * this.dRat + this.db) * this.dRy;

      vx += (tx - this.x) * P.returnK;
      vy += (ty - this.y) * P.returnK;

      const dx = this.x - smx;
      const dy = this.y - smy;
      const d  = Math.sqrt(dx * dx + dy * dy);
      const er = P.mouseRadius * (0.65 + this.mw * 0.4);

      if (d < er && d > 0.5) {
        const t2 = 1 - d / er;
        const f  = t2 * P.mousePush * this.mw;
        const a  = Math.atan2(dy, dx);
        vx += Math.cos(a) * f;
        vy += Math.sin(a) * f;
      }

      this.px = this.x;
      this.py = this.y;
      this.x += vx;
      this.y += vy;
      this.vel = Math.sqrt(vx * vx + vy * vy);
    }
  }

  // Spatial hash
  let grid = {}, cellSz = P.linkFar;

  function hashBuild() {
    grid = {};
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      const k = (n.x / cellSz | 0) + "," + (n.y / cellSz | 0);
      (grid[k] || (grid[k] = [])).push(i);
    }
  }

  function hashNear(nx, ny) {
    const cx = nx / cellSz | 0, cy = ny / cellSz | 0;
    const out = [];
    for (let dx = -1; dx <= 1; dx++)
      for (let dy = -1; dy <= 1; dy++) {
        const c = grid[(cx+dx)+","+(cy+dy)];
        if (c) for (const i of c) out.push(i);
      }
    return out;
  }

  let nodes = [];

  // Precomputed edge list for triangle detection
  let edges = new Set();
  let edgePairs = [];

  function init() {
    resize();
    nodes = [];
    for (let i = 0; i < COUNT; i++) nodes.push(new Node());
    nodes.sort((a, b) => a.depth - b.depth);
  }

  function edgeKey(i, j) {
    return i < j ? i * 10000 + j : j * 10000 + i;
  }

  function render(t) {
    ctx.clearRect(0, 0, W, H);
    hashBuild();

    // Build edge set + neighbor lists for triangles
    edges.clear();
    edgePairs.length = 0;
    for (let i = 0; i < nodes.length; i++) nodes[i].neighbors.length = 0;

    // Collect all near-range edges
    for (let i = 0; i < nodes.length; i++) {
      const a = nodes[i];
      for (const j of hashNear(a.x, a.y)) {
        if (j <= i) continue;
        const b = nodes[j];
        if (Math.abs(a.depth - b.depth) > 1) continue;
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < P.linkNear) {
          const key = edgeKey(i, j);
          edges.add(key);
          edgePairs.push([i, j, d]);
          a.neighbors.push(j);
          b.neighbors.push(i);
        }
      }
    }

    // ── Triangle fills ──
    // For each near-edge, check if any shared neighbor completes a triangle
    const drawnTris = new Set();
    for (const [i, j] of edgePairs) {
      const a = nodes[i], b = nodes[j];
      for (const k of a.neighbors) {
        if (k <= j) continue; // avoid duplicates
        if (edges.has(edgeKey(j, k))) {
          const triKey = i * 100000000 + j * 10000 + k;
          if (drawnTris.has(triKey)) continue;
          drawnTris.add(triKey);

          const c = nodes[k];
          const h = ((a.hue + b.hue + c.hue) / 3) | 0;
          const s = ((a.sat + b.sat + c.sat) / 3) | 0;
          const l = ((a.lit + b.lit + c.lit) / 3 + 4) | 0;
          const dAvg = (a.depth + b.depth + c.depth) / 3 / (P.depthLayers - 1);
          const alpha = P.triAlpha * (0.3 + dAvg * 0.7);

          ctx.fillStyle = "hsla(" + h + "," + s + "%," + l + "%," + alpha + ")";
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.lineTo(c.x, c.y);
          ctx.closePath();
          ctx.fill();
        }
      }
    }

    // ── Far connections (ambient web) ──
    for (let i = 0; i < nodes.length; i++) {
      const a = nodes[i];
      for (const j of hashNear(a.x, a.y)) {
        if (j <= i) continue;
        const b = nodes[j];
        if (Math.abs(a.depth - b.depth) > 1) continue;
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d >= P.linkNear && d < P.linkFar) {
          const fade = 1 - (d - P.linkNear) / (P.linkFar - P.linkNear);
          const sf = fade * fade;
          const dFactor = ((a.depth + b.depth) / 2) / (P.depthLayers - 1);
          const alpha = sf * P.linkFarAlpha * (0.3 + dFactor * 0.7);
          const h = ((a.hue + b.hue) / 2) | 0;
          const s = ((a.sat + b.sat) / 2) | 0;
          const l = ((a.lit + b.lit) / 2) | 0;

          ctx.strokeStyle = "hsla(" + h + "," + s + "%," + l + "%," + alpha + ")";
          ctx.lineWidth = 0.3 + dFactor * 0.3;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    // ── Near connections (curved bezier mesh) ──
    for (const [i, j, d] of edgePairs) {
      const a = nodes[i], b = nodes[j];
      const fade = 1 - d / P.linkNear;
      const sf = Math.sin(fade * Math.PI * 0.5);
      const av = (a.vel + b.vel) * 0.5;
      const hShift = Math.min(av * 1.5, 12);
      const h = (((a.hue + b.hue) / 2 + hShift) % 360) | 0;
      const s = ((a.sat + b.sat) / 2) | 0;
      const l = ((a.lit + b.lit) / 2 + Math.min(av * 1.5, 5)) | 0;
      const dFactor = ((a.depth + b.depth) / 2) / (P.depthLayers - 1);
      const alpha = sf * P.linkNearAlpha * (0.4 + dFactor * 0.6);

      // Curved connection — control point offset perpendicular to line
      const mx2 = (a.x + b.x) / 2;
      const my2 = (a.y + b.y) / 2;
      const nx = -(b.y - a.y);  // perpendicular
      const ny =  (b.x - a.x);
      const nl = Math.sqrt(nx*nx + ny*ny) || 1;
      const curve = (a.curveSeed + b.curveSeed) * d * 0.15;
      const cpx = mx2 + (nx / nl) * curve;
      const cpy = my2 + (ny / nl) * curve;

      ctx.strokeStyle = "hsla(" + h + "," + s + "%," + l + "%," + alpha + ")";
      ctx.lineWidth = 0.5 + dFactor * 0.8 + sf * 0.3;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.quadraticCurveTo(cpx, cpy, b.x, b.y);
      ctx.stroke();
    }

    // ── Mouse rays ──
    if (smx > 0) {
      for (const n of nodes) {
        const dx = n.x - smx, dy = n.y - smy;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < P.mLinkDist) {
          const f = 1 - d / P.mLinkDist;
          const sf = Math.sin(f * Math.PI * 0.5);
          const a = sf * sf * P.mLinkBase * n.mw;
          const l = n.lit + Math.min(n.vel * 2, 6);
          ctx.strokeStyle = "hsla(" + n.hue + "," + n.sat + "%," + l + "%," + a + ")";
          ctx.lineWidth = 0.25 + sf * 0.55;
          ctx.beginPath();
          ctx.moveTo(smx, smy);
          ctx.lineTo(n.x, n.y);
          ctx.stroke();
        }
      }
    }

    // ── Nodes ──
    for (const n of nodes) {
      const dx = n.x - smx, dy = n.y - smy;
      const md = Math.sqrt(dx*dx + dy*dy);
      const prox = Math.max(0, 1 - md / (P.mouseRadius * 1.3));
      const p2 = prox * prox;
      const vf = Math.min(n.vel * 0.4, 1);

      const h = (n.hue + vf * 18) % 360;
      const s = n.sat + vf * 6;
      const l = n.lit + vf * 5 + p2 * 5;
      const a = n.alpha + p2 * 0.25 + vf * 0.05;

      // Bloom
      if (p2 > 0.01 || vf > 0.04) {
        const br = n.r * (5 + p2 * 6 + vf * 3);
        const ba = p2 * 0.055 + vf * 0.018;
        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, br);
        g.addColorStop(0,   "hsla(" + h + "," + s + "%," + l + "%," + ba + ")");
        g.addColorStop(0.4, "hsla(" + h + "," + s + "%," + l + "%," + (ba*0.18) + ")");
        g.addColorStop(1,   "hsla(" + h + "," + s + "%," + l + "%,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(n.x, n.y, br, 0, Math.PI * 2);
        ctx.fill();
      }

      // Core
      const cr = n.r + p2 * 1.2 + vf * 0.4;
      ctx.fillStyle = "hsla(" + h + "," + s + "%," + l + "%," + Math.min(a, 0.85) + ")";
      ctx.beginPath();
      ctx.arc(n.x, n.y, cr, 0, Math.PI * 2);
      ctx.fill();

      // Bright center
      if (n.depth === P.depthLayers - 1 && (p2 > 0.12 || vf > 0.15)) {
        const da = p2 * 0.3 + vf * 0.12;
        ctx.fillStyle = "hsla(" + h + ",20%,96%," + Math.min(da, 0.4) + ")";
        ctx.beginPath();
        ctx.arc(n.x, n.y, cr * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Cursor glow
    if (smx > 0) {
      const ms = Math.sqrt(mvx*mvx + mvy*mvy);
      const g = Math.min(ms * 0.12, 1);
      const r = 40 + g * 18;
      const gr = ctx.createRadialGradient(smx, smy, 0, smx, smy, r);
      gr.addColorStop(0,   "hsla(235,30%,85%," + (0.02 + g*0.018) + ")");
      gr.addColorStop(0.6, "hsla(235,30%,85%," + (0.005 + g*0.006) + ")");
      gr.addColorStop(1,   "hsla(235,30%,85%,0)");
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.arc(smx, smy, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function frame(t) {
    if (mx > 0) {
      mvx = mvx * 0.88 + (mx - pmx) * 0.12;
      mvy = mvy * 0.88 + (my - pmy) * 0.12;
    }
    pmx = mx; pmy = my;

    // Very heavy mouse smoothing
    if (mx > 0) {
      if (smx < 0) { smx = mx; smy = my; }
      smx += (mx - smx) * 0.045;
      smy += (my - smy) * 0.045;
    } else {
      smx = smy = -9999;
    }

    for (const n of nodes) n.update(t);
    render(t);
    requestAnimationFrame(frame);
  }

  addEventListener("resize", () => {
    const ow = W, oh = H;
    resize();
    for (const n of nodes) {
      n.hx = n.hx / ow * W;
      n.hy = n.hy / oh * H;
    }
  });

  addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });
  addEventListener("mouseleave", () => { mx = my = -9999; });
  addEventListener("touchmove", e => {
    mx = e.touches[0].clientX; my = e.touches[0].clientY;
  }, { passive: true });
  addEventListener("touchend", () => { mx = my = -9999; });

  init();
  requestAnimationFrame(frame);
})();
</script>

  <script data-goatcounter="https://peter1001.goatcounter.com/count"

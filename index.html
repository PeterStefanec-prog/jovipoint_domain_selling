<!doctype html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jovipoint.sk</title>
  <meta name="description" content="jovipoint.sk — doména na predaj." />

  <style>
    :root {
      --bg: #f5f5f7;
      --bg-2: #ffffff;
      --text: #0f1115;
      --muted: #6e7381;
      --line: rgba(15, 17, 21, 0.08);
      --line-strong: rgba(15, 17, 21, 0.14);
      --glass: rgba(255, 255, 255, 0.72);
      --shadow: 0 20px 60px rgba(17, 24, 39, 0.10);
      --shadow-soft: 0 10px 30px rgba(17, 24, 39, 0.06);
      --radius-xl: 32px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --container: 1180px;
      --mx: 50%;
      --my: 50%;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Inter, sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(122, 162, 255, 0.20), transparent 24%),
        radial-gradient(circle at 85% 12%, rgba(166, 109, 255, 0.14), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255, 177, 95, 0.12), transparent 30%),
        linear-gradient(180deg, #fbfbfd 0%, #f2f3f7 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(500px circle at var(--mx) var(--my), rgba(255,255,255,0.75), transparent 50%);
      opacity: 0.9;
    }

    .aurora,
    .noise,
    .halo {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .aurora::before,
    .aurora::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(80px);
      opacity: 0.65;
      animation: float 16s ease-in-out infinite;
    }

    .aurora::before {
      width: 420px;
      height: 420px;
      top: -100px;
      left: -80px;
      background: rgba(113, 157, 255, 0.22);
    }

    .aurora::after {
      width: 360px;
      height: 360px;
      right: -80px;
      top: 100px;
      background: rgba(185, 120, 255, 0.18);
      animation-delay: -7s;
    }

    .halo::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 46%;
      transform: translate(-50%, -50%);
      width: min(78vw, 1000px);
      height: min(78vw, 1000px);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.42) 32%, transparent 68%);
      opacity: 0.75;
      animation: breathe 10s ease-in-out infinite;
    }

    .noise {
      opacity: 0.045;
      background-image:
        radial-gradient(circle at 20% 20%, #000 0.5px, transparent 0.8px),
        radial-gradient(circle at 70% 55%, #000 0.5px, transparent 0.8px),
        radial-gradient(circle at 40% 82%, #000 0.5px, transparent 0.8px);
      background-size: 28px 28px, 34px 34px, 22px 22px;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(calc(100% - 32px), var(--container));
      margin: 0 auto;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(15, 17, 21, 0.08);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      line-height: 1.02;
    }

    .brand-copy strong {
      font-size: 0.98rem;
      letter-spacing: -0.02em;
    }

    .brand-copy span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .nav-link {
      text-decoration: none;
      color: var(--text);
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(15, 17, 21, 0.08);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .nav-link:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: rgba(255,255,255,0.86);
    }

    .hero {
      min-height: calc(100vh - 84px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 40px 0 80px;
    }

    .hero-inner {
      max-width: 980px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.68);
      border: 1px solid rgba(15, 17, 21, 0.07);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow-soft);
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 28px;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #24c26a;
      box-shadow: 0 0 16px rgba(36, 194, 106, 0.45);
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 11vw, 8.8rem);
      line-height: 0.88;
      letter-spacing: -0.10em;
      font-weight: 700;
    }

    .title-gradient {
      background: linear-gradient(180deg, #0f1115 0%, #1a2333 58%, #3b4660 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin: 22px 0 0;
      font-size: clamp(1.1rem, 2.3vw, 1.5rem);
      line-height: 1.45;
      color: #2b3240;
      letter-spacing: -0.03em;
      max-width: 24ch;
    }

    .caption {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.8;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-top: 34px;
    }

    .btn {
      position: relative;
      min-height: 58px;
      padding: 0 24px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.01em;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
      box-shadow: 0 14px 30px rgba(17, 24, 39, 0.16);
    }

    .btn-primary::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.22) 50%, transparent 80%);
      transform: translateX(-130%);
    }

    .btn-primary:hover::before {
      animation: sweep 1s ease;
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(15, 17, 21, 0.08);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
    }

    .contact-card {
      margin-top: 34px;
      padding: 18px 22px;
      border-radius: 999px;
      background: rgba(255,255,255,0.66);
      border: 1px solid rgba(15, 17, 21, 0.07);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow-soft);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .contact-card strong {
      color: var(--text);
      font-weight: 600;
    }

    .footer {
      padding: 0 0 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(10px);
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.92);
      color: white;
      font-size: 0.95rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 20;
      box-shadow: 0 16px 40px rgba(17, 24, 39, 0.22);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes float {
      0%, 100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(16px,18px,0) scale(1.05); }
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.78; }
      50% { transform: translate(-50%, -50%) scale(1.04); opacity: 0.55; }
    }

    @keyframes sweep {
      to { transform: translateX(130%); }
    }

    @media (max-width: 720px) {
      .nav-link {
        display: none;
      }

      .actions {
        flex-direction: column;
        width: 100%;
        max-width: 360px;
      }

      .btn {
        width: 100%;
      }

      .contact-card {
        width: 100%;
        max-width: 360px;
        justify-content: center;
        text-align: center;
        border-radius: 22px;
        flex-direction: column;
        gap: 6px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }

      .reveal {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="halo"></div>
  <div class="noise"></div>

  <div class="wrap">
    <nav class="nav">
      <a class="brand" href="#">
        <div class="brand-mark">JP</div>
        <div class="brand-copy">
          <strong>jovipoint.sk</strong>
          <span>doména na predaj</span>
        </div>
      </a>

      <a class="nav-link" href="mailto:peter.stefanec10@gmail.com?subject=Záujem o doménu jovipoint.sk">Kontakt</a>
    </nav>

    <main class="hero">
      <div class="hero-inner reveal">
        <div class="badge">
          <span class="badge-dot"></span>
          <span>available now</span>
        </div>

        <h1><span class="title-gradient">jovipoint.sk</span></h1>

        <p class="subtitle">Doména na predaj.</p>
        <p class="caption">Ak ju chcete pre svoju značku, ozvite sa.</p>

        <div class="actions">
          <a class="btn btn-primary" href="mailto:peter.stefanec10@gmail.com?subject=Záujem o doménu jovipoint.sk">
            Napísať e-mail
          </a>

          <button class="btn btn-secondary" id="copyEmailBtn" type="button">
            Kopírovať kontakt
          </button>
        </div>

        <div class="contact-card">
          <span>Kontakt</span>
          <strong>peter.stefanec10@gmail.com</strong>
        </div>
      </div>
    </main>

    <div class="footer">jovipoint.sk</div>
  </div>

  <div class="toast" id="toast">E-mail skopírovaný</div>

  <script>
    const email = "peter.stefanec10@gmail.com";
    const toast = document.getElementById("toast");
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function showToast() {
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    async function copyEmail() {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(email);
          showToast();
          return;
        }

        const helper = document.createElement("textarea");
        helper.value = email;
        helper.style.position = "fixed";
        helper.style.opacity = "0";
        document.body.appendChild(helper);
        helper.focus();
        helper.select();
        document.execCommand("copy");
        document.body.removeChild(helper);
        showToast();
      } catch (e) {
        window.location.href = "mailto:" + email + "?subject=Záujem o doménu jovipoint.sk";
      }
    }

    document.getElementById("copyEmailBtn").addEventListener("click", copyEmail);

    if (!prefersReducedMotion) {
      const reveal = document.querySelector(".reveal");
      requestAnimationFrame(() => reveal.classList.add("visible"));

      window.addEventListener("mousemove", (e) => {
        document.documentElement.style.setProperty("--mx", e.clientX + "px");
        document.documentElement.style.setProperty("--my", e.clientY + "px");
      });
    } else {
      document.querySelector(".reveal").classList.add("visible");
    }
  </script>
</body>
</html>
